<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#050505"/>
  <!-- Card shape -->
  <rect x="80" y="168" width="352" height="220" rx="28" fill="#121212" stroke="#10b981" stroke-width="3"/>
  <!-- Magnetic stripe / accent bar -->
  <rect x="80" y="230" width="352" height="52" fill="#10b981" opacity="0.15"/>
  <rect x="80" y="230" width="352" height="4" fill="#10b981"/>
  <!-- Card dots (decorative) -->
  <circle cx="148" cy="314" r="18" fill="#1e1e1e" stroke="#10b981" stroke-width="2"/>
  <circle cx="196" cy="314" r="18" fill="#1e1e1e" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  <!-- Amount text area -->
  <rect x="292" y="298" width="116" height="32" rx="8" fill="#10b981" opacity="0.15"/>
  <line x1="300" y1="314" x2="400" y2="314" stroke="#10b981" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
